<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesion</title>
    <link rel="stylesheet" href="../css/stylo.css">
</head>
<body>
    <div class="left">
        <div class="overlay"></div>
    </div>

  <div class="right">
    <img class="logo" src="../image/pokeball_100x100.png" alt="Logo GranCole" />
    <h2>Bienvenido a GranCole</h2>
    <p class="subtitle">Inicia sesión para continuar</p>

    <div class="login-container">
      <form>
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="0000000" />

        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="●●●●●●" />

        <div class="forgot">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login">Iniciar Sesión →</button>
      </form>

      <div class="bottom">
        ¿No tienes cuenta? <a href="#">Contacta al administrador</a>
        <div class="copyright">© 2025 GranCole Pro. Todos los derechos reservados.</div>
      </div>
    </div>
  </div>

</body>
</html>
